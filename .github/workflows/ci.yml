name: ci

on:
  push:
  pull_request:

jobs:
  platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate generator and conformance
        run: |
          python3 -m tooling.peripheralos --spec-dir platform/spec --out-dir platform/generated
          python3 -m unittest discover -s tests -v
