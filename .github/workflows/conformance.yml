name: PeripheralOS Conformance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate platform contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run PeripheralOS validation CLI
        run: python platform/generator/peripheralos_validate.py all

      - name: Run virtual motor campaigns
        run: python -m tooling.peripheralos.campaign_runner --scenario platform/tests/scenarios/basic-motion.json --profile default --profile aim --fuzz-seed seed-a --out-dir platform/generated/campaigns

      - name: Run baseline regression runner
        run: python -m tooling.peripheralos.baseline_runner --scenario platform/tests/scenarios/basic-motion.json --baseline platform/tests/golden/virtual-campaigns/baseline.snapshot.json --out-dir platform/generated/baselines

      - name: Run conformance tests
        run: python -m unittest discover -s tests -v
